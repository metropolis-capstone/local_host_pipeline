# What the YAML would look like

# vmagent uses Prometheus-compatible config. To drop a label from a specific metric you'd use metric_relabel_configs with a replace action that sets the label to empty (which drops it):

# - match: 'http_requests_total' // metric name
#   interval: 1m // aggregation timing
#   outputs: [sum_samples] // 
#   without: [request_id] // problem label being dropped


# received by vmagent
# http_requests_total{request_type="GET", label2="abc"} = 10 // 1:00
# http_requests_total{request_type="GET", label2="xyz"} = 50 // 1:00
# http_requests_total{request_type="GET", label2="def"} = 850 // 1:00
# http_requests_total{request_type="GET", label2="ghi"} = 120 // 1:00
# http_requests_total{request_type="GET", label2="jkl"} = 30 // 1:00

# cpu_usage{application="app1", } = 10% 1:00
# cpu_usage{application="app1", } = 10% 1:00
# cpu_usage{application="app1", } = 11% 1:00

# http_requests_total{request_type="POST", label2="abc"} = 5

# # actually being sent to db, drops label2
# http_requests_total{request_type="GET"} = 1060 // 1:00
# http_requests_total{request_type="POST"} = 5


